name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # --omit=optional skips platform/arch-specific optional deps (e.g.
        # @rolldown/binding-wasm32-wasi pulled by vitest) whose lockfile
        # entries can be incomplete when the lock was generated on Windows.
        run: npm ci --omit=optional

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test --if-present

      - name: Build
        # Build runs without secrets — pages must be resilient to missing env
        # vars (we already handle that in getStaticProps with try/catch).
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
